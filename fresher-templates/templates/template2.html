    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Professional Template | ToolCanvas</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="template2.css">
    <link rel="icon" type="image/png" href="../../logo/logo.png">
</head>
<body>

    <div class="resume-paper-wrapper">
        <main class="resume-sheet">
            <!-- Header Segment -->
            <header class="header-modern">
                <h1 id="doc-name">Jane Vance</h1>
                <div id="doc-title" class="modern-header-title">Computer Science Graduate</div>
                <div id="doc-contact-row" class="modern-contact-details">jane.vance@studentdev.com &nbsp;•&nbsp; +1 (617) 555-0143 &nbsp;•&nbsp; Boston, MA</div>
            </header>

            <!-- Summary -->
            <section class="resume-section" id="doc-summary-section">
                <h2 class="resume-section-title">Professional Summary</h2>
                <p id="doc-summary-val" class="summary-paragraph">Loading summary details...</p>
            </section>

            <!-- Education -->
            <section class="resume-section" id="doc-education-section">
                <h2 class="resume-section-title">Education</h2>
                <div id="doc-education-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Projects -->
            <section class="resume-section" id="doc-projects-section">
                <h2 class="resume-section-title">Projects</h2>
                <div id="doc-project-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Experience -->
            <section class="resume-section" id="doc-experience-section">
                <h2 class="resume-section-title">Work Experience</h2>
                <div id="doc-experience-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Activities & Leadership -->
            <section class="resume-section" id="doc-activities-section">
                <h2 class="resume-section-title">Leadership & Activities</h2>
                <div id="doc-activities-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Skills -->
            <section class="resume-section" id="doc-skills-section">
                <h2 class="resume-section-title">Skills & Technologies</h2>
                <p id="doc-skills-val" class="skills-paragraph">Loading skills...</p>
            </section>
        </main>
    </div>

    <script src="loader.js"></script>
</body>
</html>
