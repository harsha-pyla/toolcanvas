<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slate Tech Template | ToolCanvas</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="template3.css">
    <link rel="icon" type="image/png" href="../../logo/logo.png">
</head>
<body>

    <div class="resume-paper-wrapper">
        <main class="resume-sheet">
            <!-- Header Segment -->
            <header class="header-tech">
                <div class="tech-header-top">
                    <h1 id="doc-name">David Vance</h1>
                    <div id="doc-title" class="tech-header-title">Senior Full Stack Engineer</div>
                </div>
                <div id="doc-contact-row" class="tech-contact-details font-mono">david.vance@techdev.com &nbsp;|&nbsp; +1 (415) 555-0192 &nbsp;|&nbsp; San Francisco, CA</div>
            </header>

            <!-- Summary -->
            <section class="resume-section" id="doc-summary-section">
                <h2 class="resume-section-title">Summary</h2>
                <p id="doc-summary-val" class="summary-paragraph">Loading summary details...</p>
            </section>

            <!-- Experience -->
            <section class="resume-section" id="doc-experience-section">
                <h2 class="resume-section-title">Technical Experience</h2>
                <div id="doc-experience-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Education -->
            <section class="resume-section" id="doc-education-section">
                <h2 class="resume-section-title">Education</h2>
                <div id="doc-education-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Skills -->
            <section class="resume-section" id="doc-skills-section">
                <h2 class="resume-section-title">Technologies & Skills</h2>
                <div id="doc-skills-val" class="tech-skills-tags font-mono">
                    <!-- Loaded dynamically as tag list -->
                </div>
            </section>
        </main>
    </div>

    <script src="loader.js"></script>
</body>
</html>
