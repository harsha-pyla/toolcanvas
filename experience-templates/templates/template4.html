<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Elegant Template | ToolCanvas</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="template4.css">
    <link rel="icon" type="image/png" href="../../logo/logo.png">
</head>
<body>

    <div class="resume-paper-wrapper">
        <main class="resume-sheet">
            <!-- Header Segment -->
            <header class="header-elegant">
                <h1 id="doc-name">David Vance</h1>
                <div id="doc-title" class="elegant-header-title">Senior Full Stack Engineer</div>
                <div id="doc-contact-row" class="elegant-contact-details">david.vance@techdev.com &nbsp;•&nbsp; +1 (415) 555-0192 &nbsp;•&nbsp; San Francisco, CA</div>
                <hr class="header-rule">
            </header>

            <!-- Summary -->
            <section class="resume-section" id="doc-summary-section">
                <h2 class="resume-section-title">Professional Summary</h2>
                <p id="doc-summary-val" class="summary-paragraph">Loading summary details...</p>
            </section>

            <!-- Experience -->
            <section class="resume-section" id="doc-experience-section">
                <h2 class="resume-section-title">Experience</h2>
                <div id="doc-experience-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Education -->
            <section class="resume-section" id="doc-education-section">
                <h2 class="resume-section-title">Education</h2>
                <div id="doc-education-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Skills -->
            <section class="resume-section" id="doc-skills-section">
                <h2 class="resume-section-title">Skills & Competencies</h2>
                <p id="doc-skills-val" class="skills-paragraph">Loading skills...</p>
            </section>
        </main>
    </div>

    <script src="loader.js"></script>
</body>
</html>
